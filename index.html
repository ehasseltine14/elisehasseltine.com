<style>
  :root {
    --paper:     #EFE6CD;
    --paper-lt:  #F5EED9;
    --paper-dk:  #E5D9B8;
    --ink:       #121212;
    --ink-soft:  #2A2622;
    --muted:     #6E6657;
    --rule:      #1A1715;
    --red:       #E2231A;
    --red-dk:    #B81810;
    --yellow:    #F5C518;
    --blue:      #1A4FB5;
    --green:     #2F6B3A;
    --display: "Helvetica Neue", "Helvetica", "Arial Black", "Arial", sans-serif;
    --serif:   "Roboto Slab", "Rockwell", "Courier New", serif;
  }

  [data-palette="newsstand"] { --red: #D81E20; --yellow: #F2C12F; --blue: #1A4FB5; --paper: #EBE2C8; }
  [data-palette="subway"]    { --red: #EE352E; --yellow: #FCCC0A; --blue: #0039A6; --paper: #F2E9D2; }
  [data-palette="press"]     { --red: #C8231C; --yellow: #E8B816; --blue: #15387A; --paper: #E8DEC0; }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; background: var(--paper); }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--display);
    font-weight: 500;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "kern", "liga";
    position: relative;
  }
  /* Paper grain */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.07  0 0 0 0 0.06  0 0 0 0 0.05  0 0 0 0.42 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    opacity: 0.38;
    mix-blend-mode: multiply;
  }
  /* Soft paper warmth gradient */
  body::after {
    content: "";
    position: fixed; inset: 0; pointer-events: none; z-index: 99;
    background: radial-gradient(ellipse at 30% 20%, rgba(255,235,180,0.18), transparent 60%),
                radial-gradient(ellipse at 80% 90%, rgba(120,80,30,0.10), transparent 55%);
  }

  ::selection { background: var(--red); color: var(--paper); }

  /* ===== TYPE ===== */
  .helv  { font-family: var(--display); }
  .slab  { font-family: var(--serif); font-weight: 700; }
  .meta  {
    font-family: var(--display);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .meta-sm {
    font-family: var(--display);
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  /* ===== TOP BAR ===== */
  .top-rule { height: 8px; background: var(--ink); width: 100%; }
  .top-rule.thin { height: 2px; }

  nav.top {
    position: sticky;
    top: 0;
    z-index: 60;
    background: var(--paper);
    border-bottom: 2px solid var(--ink);
  }
  nav.top .row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 14px 32px;
    gap: 24px;
  }
  nav.top .left  { display: flex; gap: 18px; align-items: center; }
  nav.top .right { display: flex; gap: 22px; justify-content: flex-end; align-items: center; }
  nav.top .center { font-family: var(--display); font-weight: 900; font-size: 13px; letter-spacing: 0.06em; }
  nav.top a {
    color: var(--ink); text-decoration: none;
    font-family: var(--display); font-weight: 700;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    position: relative; padding: 4px 0;
  }
  nav.top a .num { color: var(--red); font-weight: 900; margin-right: 6px; }
  nav.top a::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -4px;
    height: 2px; background: var(--ink); transform: scaleX(0); transform-origin: left;
    transition: transform 300ms cubic-bezier(.2,.7,.2,1);
  }
  nav.top a:hover::after, nav.top a.active::after { transform: scaleX(1); }
  nav.top a.active .num { color: var(--ink); background: var(--yellow); padding: 2px 5px; }

  nav.top .right { position: relative; }
  .nav-index {
    appearance: none;
    background: transparent;
    border: 2px solid var(--ink);
    color: var(--ink);
    font-family: var(--display);
    font-weight: 900;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 8px 14px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: background 180ms ease, color 180ms ease;
  }
  .nav-index:hover, .nav-index.open { background: var(--ink); color: var(--paper); }
  .nav-index .caret { font-size: 13px; line-height: 1; transition: transform 180ms ease; }
  .nav-index.open .caret { transform: rotate(180deg); }

  .nav-menu {
    position: absolute;
    top: calc(100% + 10px);
    right: 0;
    min-width: 240px;
    background: var(--paper);
    border: 2px solid var(--ink);
    box-shadow: 6px 6px 0 var(--ink);
    display: flex;
    flex-direction: column;
    z-index: 70;
  }
  .nav-menu a {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--rule);
    text-decoration: none;
  }
  .nav-menu a:last-child { border-bottom: none; }
  .nav-menu a:hover { background: var(--paper-dk); }
  .nav-menu a::after { display: none; }
  .nav-menu a.active { background: var(--yellow); }
  .nav-menu a.active .num { background: transparent; padding: 0; }

  /* ===== HERO ===== */
  .hero {
    position: relative;
    padding: 0;
    border-bottom: 8px solid var(--ink);
    overflow: hidden;
  }
  .hero-meta {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    border-bottom: 2px solid var(--ink);
    background: var(--paper-lt);
  }
  .hero-meta > div {
    padding: 10px 18px;
    border-right: 1px solid var(--ink);
    font-family: var(--display); font-weight: 700;
    font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .hero-meta > div:last-child { border-right: none; }
  .hero-meta .k { color: var(--muted); }
  .hero-meta .v { color: var(--ink); }

  .hero-stage {
    position: relative;
    padding: 80px 32px 64px;
    min-height: 76vh;
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 64px;
    align-items: start;
  }

  h1.hello {
    font-family: var(--display);
    font-weight: 900;
    color: var(--red);
    margin: 0;
    line-height: 0.82;
    letter-spacing: -0.04em;
    font-size: clamp(120px, 22vw, 320px);
    text-transform: lowercase;
  }
  h1.hello .dot { color: var(--ink); }

  .hero-tag {
    margin-top: 28px;
    max-width: 620px;
    font-family: var(--display);
    font-weight: 500;
    font-size: clamp(22px, 2.2vw, 28px);
    line-height: 1.18;
    color: var(--ink);
    letter-spacing: -0.012em;
  }
  .hero-tag b { font-weight: 900; }
  .hero-tag .hilite {
    background: var(--yellow);
    padding: 0 6px;
    box-decoration-break: clone;
    -webkit-box-decoration-break: clone;
  }

  .hero-aside {
    position: relative;
    padding-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    align-items: flex-start;
  }
  .hero-aside .stamp {
    border: 2px solid var(--ink);
    padding: 14px 18px;
    background: var(--paper-lt);
    display: inline-block;
    font-family: var(--display); font-weight: 700;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    transform: rotate(-2deg);
    color: var(--red);
    position: relative;
  }
  .hero-aside .stamp::after {
    content: "";
    position: absolute; inset: 4px;
    border: 1px solid var(--red);
    pointer-events: none;
  }

  .hero-aside .signature {
    font-family: var(--display);
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink);
    max-width: 360px;
  }
  .hero-aside .signature .label { display: block; font-weight: 700; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .hero-aside .signature .name { font-weight: 900; font-size: 18px; letter-spacing: -0.01em; }
  .hero-aside .signature .where { font-weight: 500; color: var(--ink-soft); }

  /* Geometric mark */
  .hero-mark {
    width: 100%;
    max-width: 280px;
    aspect-ratio: 1 / 1;
    background: var(--ink);
    position: relative;
    display: grid;
    place-items: center;
    margin-top: auto;
    align-self: flex-end;
  }
  .hero-mark .circle {
    width: 64%;
    aspect-ratio: 1/1;
    border-radius: 50%;
    background: var(--yellow);
    position: relative;
  }
  .hero-mark .circle::after {
    content: "";
    position: absolute;
    left: 50%; top: 0; bottom: 0;
    width: 0; border-left: 2px solid var(--ink);
  }
  .hero-mark .tag-tl, .hero-mark .tag-br {
    position: absolute;
    font-family: var(--display); font-weight: 700;
    font-size: 9.5px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--paper-lt);
  }
  .hero-mark .tag-tl { top: 10px; left: 12px; }
  .hero-mark .tag-br { bottom: 10px; right: 12px; transform: rotate(180deg); }

  .hero-foot {
    border-top: 2px solid var(--ink);
    padding: 14px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--paper-lt);
  }
  .hero-foot .l, .hero-foot .r {
    font-family: var(--display); font-weight: 700;
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink);
  }
  .hero-foot .arrow {
    display: inline-block; width: 28px; height: 1.5px; background: var(--ink); margin: 0 10px;
    position: relative;
  }
  .hero-foot .arrow::after {
    content: ""; position: absolute; right: -2px; top: -3.5px;
    width: 8px; height: 8px; border-right: 1.5px solid var(--ink); border-bottom: 1.5px solid var(--ink);
    transform: rotate(-45deg);
  }

  /* ===== SECTION SHELL ===== */
  section.body {
    position: relative;
    border-bottom: 2px solid var(--ink);
    padding: 0;
  }
  .section-banner {
    display: grid;
    grid-template-columns: 240px 1fr auto auto;
    align-items: stretch;
    border-bottom: 2px solid var(--ink);
  }
  button.section-banner {
    appearance: none;
    background: var(--paper);
    color: inherit;
    font: inherit;
    text-align: left;
    width: 100%;
    padding: 0;
    border: 0;
    border-bottom: 2px solid var(--ink);
  }
  button.section-banner.collapsible { cursor: pointer; }
  button.section-banner.collapsible:hover { background: var(--paper-lt); }
  .banner-caret {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 24px;
    font-size: 22px;
    line-height: 1;
    background: var(--paper-lt);
    border-left: 2px solid var(--ink);
    color: var(--ink);
    transition: transform 220ms ease;
    font-family: var(--display);
  }
  .section-banner.collapsible.open .banner-caret { transform: rotate(180deg); }
  .section-banner .num {
    background: var(--ink);
    color: var(--paper);
    padding: 26px 28px;
    font-family: var(--display); font-weight: 900;
    font-size: 64px; line-height: 1; letter-spacing: -0.04em;
  }
  .section-banner .num.red    { background: var(--red); }
  .section-banner .num.yellow { background: var(--yellow); color: var(--ink); }
  .section-banner .num.blue   { background: var(--blue); color: var(--paper-lt); }
  .section-banner .ttl {
    padding: 0 28px;
    display: flex; align-items: center; justify-content: flex-start;
    font-family: var(--display); font-weight: 900;
    font-size: clamp(28px, 4.4vw, 64px);
    line-height: 0.98;
    letter-spacing: -0.03em;
    text-transform: uppercase;
    border-left: 2px solid var(--ink);
  }
  .section-banner .ttl em { font-style: normal; color: var(--red); }
  .section-banner .sub {
    padding: 0 24px;
    border-left: 2px solid var(--ink);
    display: flex; flex-direction: column; justify-content: center;
    background: var(--paper-lt);
    min-width: 220px;
  }
  .section-banner .sub .label {
    font-family: var(--display); font-weight: 700;
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .section-banner .sub .val {
    font-family: var(--display); font-weight: 700;
    font-size: 13px; letter-spacing: 0.05em;
    color: var(--ink);
  }

  .section-content {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .section-content .col {
    padding: 56px 32px;
  }
  .section-content .col + .col {
    border-left: 2px solid var(--ink);
  }
  .col p {
    margin: 0 0 18px 0;
    font-family: var(--display); font-weight: 500;
    font-size: 17px; line-height: 1.55;
    color: var(--ink);
    max-width: 56ch;
  }
  .col p:last-child { margin-bottom: 0; }
  .col p .lead {
    font-weight: 900; font-size: 19px;
  }
  .col p b { font-weight: 900; }
  .col .pull {
    font-family: var(--display); font-weight: 900;
    font-size: clamp(28px, 3vw, 44px);
    line-height: 1.04;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 32px;
    text-wrap: balance;
  }
  .col .pull .red { color: var(--red); }
  .col .kicker {
    font-family: var(--display); font-weight: 900;
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--red);
    margin-bottom: 16px;
    display: inline-block;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 4px;
  }

  /* ===== TICKET STUB (in Path) ===== */
  .ticket {
    margin-top: 36px;
    background: var(--paper-lt);
    border: 2px solid var(--ink);
    padding: 0;
    display: grid;
    grid-template-columns: 1fr auto 1.4fr;
    position: relative;
    max-width: 560px;
  }
  .ticket .perf {
    border-left: 2px dashed var(--ink);
    border-right: 2px dashed var(--ink);
    width: 18px;
    position: relative;
  }
  .ticket .perf::before, .ticket .perf::after {
    content: "";
    position: absolute; left: 50%; transform: translateX(-50%);
    width: 14px; height: 14px;
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 50%;
  }
  .ticket .perf::before { top: -8px; }
  .ticket .perf::after  { bottom: -8px; }
  .ticket .stub {
    padding: 18px 18px;
    text-align: left;
  }
  .ticket .stub .head {
    font-family: var(--display); font-weight: 900;
    font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--red);
    margin-bottom: 8px;
  }
  .ticket .stub .big {
    font-family: var(--serif); font-weight: 900;
    font-size: 32px; line-height: 1;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .ticket .stub .small { font-size: 11px; color: var(--muted); margin-top: 8px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700; }
  .ticket .main {
    padding: 18px 18px;
  }
  .ticket .main .label {
    font-family: var(--display); font-weight: 900;
    font-size: 9.5px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 4px;
  }
  .ticket .main .vals {
    font-family: var(--display); font-weight: 700;
    font-size: 12.5px;
    color: var(--ink);
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px;
    margin-bottom: 12px;
  }
  .ticket .main .row .k {
    font-family: var(--display); font-weight: 900;
    font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--muted);
    display: block; margin-bottom: 2px;
  }

  /* ===== FOCUS GRID ===== */
  .focus-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-top: 2px solid var(--ink);
  }
  .focus-cell {
    position: relative;
    padding: 36px 32px 32px;
    border-right: 2px solid var(--ink);
    border-bottom: 2px solid var(--ink);
    min-height: 360px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
    cursor: pointer;
    transition: transform 280ms cubic-bezier(.2,.7,.2,1);
  }
  .focus-cell:nth-child(2n) { border-right: none; }
  .focus-cell.red    { background: var(--red);    color: var(--paper-lt); }
  .focus-cell.yellow { background: var(--yellow); color: var(--ink); }
  .focus-cell.blue   { background: var(--blue);   color: var(--paper-lt); }
  .focus-cell.black  { background: var(--ink);    color: var(--paper-lt); }

  .focus-cell .fnum {
    font-family: var(--display); font-weight: 900;
    font-size: 220px;
    line-height: 0.78;
    letter-spacing: -0.05em;
    margin: -8px 0 0 -6px;
    opacity: 0.96;
  }
  .focus-cell .ftitle {
    font-family: var(--display); font-weight: 900;
    font-size: clamp(26px, 2.6vw, 36px);
    line-height: 1.0;
    letter-spacing: -0.015em;
    text-transform: uppercase;
    margin-top: 16px;
  }
  .focus-cell .fbody {
    font-family: var(--display); font-weight: 500;
    font-size: 14px;
    line-height: 1.45;
    max-width: 38ch;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transform: translateY(8px);
    transition: max-height 460ms cubic-bezier(.2,.7,.2,1), opacity 320ms ease, transform 460ms cubic-bezier(.2,.7,.2,1), margin 320ms ease;
  }
  .focus-cell.open .fbody {
    max-height: 440px;
    opacity: 1;
    transform: translateY(0);
    margin-top: 16px;
  }
  .focus-cell .fkicker {
    font-family: var(--display); font-weight: 900;
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    margin-bottom: 4px;
    opacity: 0.85;
  }
  .focus-cell .ftag {
    position: absolute;
    top: 14px; right: 14px;
    font-family: var(--display); font-weight: 700;
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    opacity: 0.85;
  }
  .focus-cell .geom {
    position: absolute;
    right: -20px;
    bottom: -30px;
    width: 220px; height: 220px;
    opacity: 0.18;
    pointer-events: none;
  }

  /* ===== CONTACT (TICKET) ===== */
  .contact-wrap {
    padding: 56px 32px 64px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 64px;
    align-items: start;
  }
  .contact-lhs h2 {
    font-family: var(--display); font-weight: 900;
    font-size: clamp(72px, 11vw, 168px);
    line-height: 0.82;
    margin: 0;
    color: var(--red);
    letter-spacing: -0.035em;
    text-transform: lowercase;
  }
  .contact-lhs h2 .dot { color: var(--ink); }
  .contact-lhs .lede {
    margin-top: 24px;
    font-family: var(--display); font-weight: 500;
    font-size: 19px; line-height: 1.45;
    max-width: 480px;
  }
  .contact-lhs .lede b { font-weight: 900; }

  /* The contact card itself, ticket style */
  .ctk {
    background: var(--paper-lt);
    border: 2px solid var(--ink);
    position: relative;
    max-width: 480px;
    box-shadow: 6px 6px 0 var(--ink);
  }
  .ctk-head {
    background: var(--ink);
    color: var(--paper-lt);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    padding: 12px 18px;
    align-items: center;
    border-bottom: 2px solid var(--ink);
  }
  .ctk-head .ttl {
    font-family: var(--display); font-weight: 900;
    font-size: 18px; letter-spacing: 0.04em; text-transform: uppercase;
  }
  .ctk-head .ttl .red { color: var(--red); }
  .ctk-head .no {
    font-family: var(--serif); font-weight: 900;
    font-size: 13px; letter-spacing: 0.06em;
    color: var(--yellow);
  }
  .ctk-head .right {
    font-family: var(--display); font-weight: 700;
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    text-align: right;
    color: var(--paper-dk);
  }

  /* Sub-bar with stamped serials */
  .ctk-strip {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    border-bottom: 2px dashed var(--ink);
    background: var(--yellow);
  }
  .ctk-strip > div {
    padding: 10px 16px;
    border-right: 1px solid var(--ink);
    font-family: var(--display); font-weight: 700;
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
  }
  .ctk-strip > div:last-child { border-right: none; }
  .ctk-strip .k { display: block; font-weight: 900; color: var(--red); margin-bottom: 2px; }

  .ctk-rows {
    padding: 0;
  }
  .ctk-rows a, .ctk-rows .row {
    display: grid;
    grid-template-columns: 110px 1fr auto;
    align-items: center;
    padding: 16px 18px;
    border-bottom: 1px dashed var(--ink);
    text-decoration: none;
    color: var(--ink);
    gap: 16px;
    transition: background 240ms ease;
  }
  .ctk-rows a:hover { background: var(--paper-dk); }
  .ctk-rows a:last-child, .ctk-rows .row:last-child { border-bottom: none; }
  .ctk-rows .k {
    font-family: var(--display); font-weight: 900;
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--red);
  }
  .ctk-rows .v {
    font-family: var(--display); font-weight: 700;
    font-size: 15px; letter-spacing: -0.005em;
    color: var(--ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }
  .ctk-rows .arr {
    font-family: var(--display); font-weight: 900;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink);
    opacity: 0.6;
    transition: opacity 240ms ease, transform 240ms cubic-bezier(.2,.7,.2,1);
  }
  .ctk-rows a:hover .arr { opacity: 1; transform: translateX(4px); }

  .ctk-foot {
    background: var(--ink);
    color: var(--paper-lt);
    padding: 12px 18px;
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--display); font-weight: 700;
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    border-top: 2px solid var(--ink);
  }
  .ctk-foot .barcode {
    display: flex; align-items: center; gap: 2px;
  }
  .ctk-foot .barcode i {
    display: block; width: 2px; background: var(--paper-lt); height: 16px;
  }
  .ctk-foot .barcode i.s { height: 10px; }
  .ctk-foot .barcode i.w { width: 4px; }

  .copy-btn {
    appearance: none;
    display: inline-block;
    text-align: center;
    text-decoration: none;
    box-sizing: border-box;
    background: var(--ink);
    color: var(--paper-lt);
    border: 2px solid var(--ink);
    font-family: var(--display); font-weight: 900;
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    padding: 14px 18px;
    margin-top: 18px;
    cursor: pointer;
    width: 100%;
    max-width: 480px;
    transition: background 220ms ease, color 220ms ease;
    position: relative;
  }
  .copy-btn:hover { background: var(--red); border-color: var(--red); color: var(--paper-lt); }

  /* ===== FOOTER ===== */
  footer {
    background: var(--ink);
    color: var(--paper-lt);
    padding: 28px 32px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 24px;
    align-items: center;
  }
  footer .l, footer .c, footer .r {
    font-family: var(--display); font-weight: 700;
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
  }
  footer .c { text-align: center; color: var(--yellow); }
  footer .r { text-align: right; color: var(--paper-dk); }
  footer .l b { color: var(--paper); }

  /* ===== REVEAL ===== */
  .reveal { opacity: 0; transform: translateY(10px); transition: opacity 900ms cubic-bezier(.2,.7,.2,1), transform 900ms cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: translateY(0); }
  .reveal.d1 { transition-delay: 80ms; }
  .reveal.d2 { transition-delay: 160ms; }
  .reveal.d3 { transition-delay: 240ms; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 1000px) {
    .hero-stage { grid-template-columns: 1fr; gap: 32px; padding: 48px 24px 40px; min-height: auto; }
    .hero-mark { max-width: 200px; }
    .section-banner { grid-template-columns: 110px 1fr auto; }
    .section-banner .num { font-size: 38px; padding: 16px 18px; }
    .section-banner .ttl { font-size: 28px; padding: 12px 18px; }
    .section-banner .sub { display: none; }
    .section-content { grid-template-columns: 1fr; }
    .section-content .col { padding: 36px 24px; }
    .section-content .col + .col { border-left: none; border-top: 2px solid var(--ink); }
    .focus-grid { grid-template-columns: 1fr; }
    .focus-cell { border-right: none; min-height: 280px; padding: 28px 24px; }
    .focus-cell .fnum { font-size: 140px; }
    .contact-wrap { grid-template-columns: 1fr; gap: 36px; padding: 40px 24px 48px; }
    .ctk-rows a, .ctk-rows .row { grid-template-columns: 90px 1fr auto; }
    .ctk-rows .v { font-size: 13.5px; }
    nav.top .row { padding: 12px 18px; grid-template-columns: 1fr auto; gap: 10px; }
    nav.top .center { display: none; }
    nav.top .right { gap: 14px; }
    nav.top a { font-size: 10px; letter-spacing: 0.14em; }
    .hero-meta { grid-template-columns: 1fr 1fr; }
    .hero-meta > div { font-size: 9.5px; padding: 8px 12px; }
    .hero-meta > div:nth-child(3), .hero-meta > div:nth-child(5) { border-right: none; }
    .hero-foot { padding: 12px 18px; flex-wrap: wrap; gap: 12px; }
    footer { grid-template-columns: 1fr; }
    footer .c, footer .r { text-align: left; }
  }
</style>
